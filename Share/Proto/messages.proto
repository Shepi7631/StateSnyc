syntax = "proto3";
option csharp_namespace = "StateSync.Shared";

message JoinRoom {
    string room_id = 1;
    string player_id = 2;
    repeated string player_ids = 3;
}

message PlayerJoined {
    string player_id = 1;
    string room_id = 2;
}

message CreateRoom {
    int32 max_players = 1;
    string room_id = 2;
}

message MoveRequest {
    float target_x = 1;
    float target_y = 2;
}

message MoveEvent {
    string player_id = 1;
    float target_x = 2;
    float target_y = 3;
    float speed = 4;
    uint32 tick = 5;
}

message PositionSync {
    string player_id = 1;
    float pos_x = 2;
    float pos_y = 3;
    bool is_moving = 4;
    uint32 tick = 5;
}

message Ping {
    uint64 server_timestamp = 1;
    uint32 sequence = 2;
    uint32 your_rtt_ms = 3;
}

message Pong {
    uint64 server_timestamp = 1;
    uint32 sequence = 2;
}
